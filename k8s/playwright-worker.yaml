apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-worker
  namespace: sovereign-signal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playwright-worker
  template:
    metadata:
      labels:
        app: playwright-worker
    spec:
      imagePullSecrets:
        - name: registry-docr-prod
      containers:
        - name: playwright-worker
          image: registry.digitalocean.com/docr-prod/sovereign-signal:latest
          command: ["python", "-m", "server.workers.playwright_worker"]
          envFrom:
            - configMapRef:
                name: sovereign-signal-config
            - secretRef:
                name: sovereign-signal-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
