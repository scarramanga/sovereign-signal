apiVersion: batch/v1
kind: CronJob
metadata:
  name: listener
  namespace: sovereign-signal
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: registry-docr-prod
          containers:
            - name: listener
              image: registry.digitalocean.com/docr-prod/sovereign-signal:latest
              command: ["python3", "-m", "server.agents.listener"]
              envFrom:
                - secretRef:
                    name: sovereign-signal-secrets
              env:
                - name: PYTHONPATH
                  value: /app
